server:
  port: 8083

spring:
  application:
    name: couponmoa
#    elasticsearch:
#      uris: ${ELASTIC_SEARCH_URL}
#      google:
#        api:
#          key: ${GOOGLE_API_KEY}
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379

  datasource:
    url: jdbc:mysql://${RDS_URL}
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  cloud:
    aws:
      region:
        static: ap-northeast-2
      stack:
        auto: false
      s3:
        bucket: couponmoa-coupon-prod

grpc:
  client:
    user-service:
      address: static://couponmoa-dev-user-service.couponmoa.local:6565
      negotiation-type: plaintext
    store-service:
      address: static://couponmoa-dev-store-service.couponmoa.local:6565
      negotiation-type: plaintext
  server:
    port: 6565


management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: ${spring.application.name} # 각 서비스 이름 자동 적용
  server:
    port: 9090

logging:
  level:
    com.couponmoa.backend.couponmoacoupon.config.GatewayAuthFilter: DEBUG
    org.springframework.security: DEBUG