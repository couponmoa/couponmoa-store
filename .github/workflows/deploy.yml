name: Deploy to ECS

on:
  push:
    branches:
      - dev

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  SPRING_PROFILE: prod
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  REDIS_HOST: ${{ secrets.REDIS_HOST }}
  RDS_URL: ${{ secrets.RDS_URL }}
  RDS_USERNAME: ${{ secrets.RDS_USERNAME }}
  RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: couponmoa-dev-store-ecr
  ECS_STORE_TASK_DEFINITION_FAMILY: ${{ secrets.ECS_STORE_TASK_DEFINITION_FAMILY }}
  ECS_STORE_SERVICE_NAME: ${{ secrets.ECS_STORE_SERVICE_NAME }}
  ECS_CLUSTER_NAME: ${{ secrets.ECS_CLUSTER_NAME }}

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew generateProto build -x test -x asciidoctor --stacktrace

      - name: Echo DB config
        run: |
          echo " RDS_URL=${{ secrets.RDS_URL }}"
          echo " RDS_USERNAME=${{ secrets.RDS_USERNAME }}"
          echo " RDS_PASSWORD is set? [${{ secrets.RDS_PASSWORD != '' }}]"
          echo " REDIS_HOST=${{ secrets.REDIS_HOST }}"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker image to ECR
        id: build_image
        shell: bash
        run: |
          IMAGE_TAG=${{ github.sha }}
          ECR_REPO="${{ secrets.ECR_REPOSITORY }}"
          REGION="${{ env.AWS_REGION }}"

          FULL_IMAGE_TAG="${AWS_ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${ECR_REPO}:${IMAGE_TAG}"

          echo "Attempting to build image with tag: ${FULL_IMAGE_TAG}"
  
          docker build -t "${FULL_IMAGE_TAG}" -f ./Dockerfile .

          echo "built_image_tag=${FULL_IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Push to ECR
        shell: bash
        run: |
          IMAGE_TAG="${{ steps.build_image.outputs.built_image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            echo "❌ Docker image tag is empty. Build step might have failed."
            exit 1
          fi
          echo "Pushing image: $IMAGE_TAG"
          docker push "$IMAGE_TAG"

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION_FAMILY }} \
            --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: couponmoa-dev-store-container
          image: ${{ steps.build_image.outputs.built_image_tag }}
          environment-variables: RDS_URL=${{ secrets.RDS_URL }},RDS_USERNAME=${{ secrets.RDS_USERNAME }},RDS_PASSWORD=${{ secrets.RDS_PASSWORD }},REDIS_HOST=${{ secrets.REDIS_HOST }},JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }},SPRING_PROFILE=${{ env.SPRING_PROFILE }}


      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_STORE_SERVICE_NAME }}
          cluster: ${{ env.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true