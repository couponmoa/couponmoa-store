name: Deploy to ECS #보다 빠른 cicd를 위한 테스트 워크플로우. 캐싱 적용, 이미지 빌드와 테스트 병렬 진행 추가 등

on:
  push:
    branches:
      - dev

env:
  AWS_REGION: ap-northeast-2
  SPRING_PROFILE: prod
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  REDIS_HOST: ${{ secrets.REDIS_HOST }}
  RDS_URL: ${{ secrets.RDS_URL }}
  RDS_USERNAME: ${{ secrets.RDS_USERNAME }}
  RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [build, test]
    outputs:
      built_image_tag: ${{ steps.build_image.outputs.built_image_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build with proto generation
        run: ./gradlew generateProto build -x asciidoctor

      # build job일 때만 Docker 이미지 빌드
      - name: Build Docker image
        if: matrix.task == 'build'
        id: build_image
        run: |
          IMAGE_TAG=${{ github.sha }}
          AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ECR_REPO="${{ secrets.ECR_REPOSITORY }}"
          REGION="${AWS_REGION}"
          FULL_IMAGE_TAG="${AWS_ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${ECR_REPO}:${IMAGE_TAG}"
          echo "Attempting to build image with tag: ${FULL_IMAGE_TAG}"
          docker build -t "${FULL_IMAGE_TAG}" -f ./Dockerfile .
          echo "built_image_tag=${FULL_IMAGE_TAG}" >> $GITHUB_ENV
          echo "::set-output name=built_image_tag::${FULL_IMAGE_TAG}"

      # test job일 때만 테스트 실행
      - name: Run Tests
        if: matrix.task == 'test'
        run: ./gradlew test

  # ECR 및 ECS 배포 작업
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        run: |
          docker push ${{ needs.build_and_test.outputs.built_image_tag }}

      - name: Download task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ secrets.ECS_TASK_DEFINITION_FAMILY }} --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: couponmoa-dev-coupon-container
          image: ${{ needs.build_and_test.outputs.built_image_tag }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_NAME }}
          cluster: ${{ secrets.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true