name: Deploy to ECS

on:
  push:
    branches:
      - dev

env:
  AWS_REGION: ap-northeast-2
  SPRING_PROFILE: prod
  JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
  REDIS_HOST: ${{ secrets.REDIS_HOST }}
  RDS_URL: ${{ secrets.RDS_URL }}
  RDS_USERNAME: ${{ secrets.RDS_USERNAME }}
  RDS_PASSWORD: ${{ secrets.RDS_PASSWORD }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Run Tests (excluding RestDocs)
        run: ./gradlew test -x asciidoctor

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up Docker and JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Generate Proto and Build
        run: ./gradlew generateProto build -x asciidoctor

      - name: Build Docker image
        id: build_image
        run: |
          IMAGE_TAG=${{ github.sha }}
          AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          ECR_REPO="${{ secrets.ECR_REPOSITORY }}"
          REGION="${AWS_REGION}"
          
          FULL_IMAGE_TAG="${AWS_ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com/${ECR_REPO}:${IMAGE_TAG}"
          
          echo "Building image: ${FULL_IMAGE_TAG}"
          docker build -t "${FULL_IMAGE_TAG}" -f ./Dockerfile .
          
          echo "IMAGE_TAG=${FULL_IMAGE_TAG}" >> $GITHUB_ENV

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Docker image to ECR
        run: |
          echo "Pushing image: ${{ env.IMAGE_TAG }}"
          docker push ${{ env.IMAGE_TAG }}

      - name: Download ECS task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ secrets.ECS_TASK_DEFINITION_FAMILY }} --query taskDefinition > task-definition.json

      - name: Fill in new image ID in ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: couponmoa-dev-coupon-container
          image: ${{ env.IMAGE_TAG }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_NAME }}
          cluster: ${{ secrets.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true
